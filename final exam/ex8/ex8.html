<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Newsletter Subscription</title>
    <link rel="stylesheet" href="ex8.css">
</head>
<body>

    <h2>Đăng ký nhận bản tin</h2>

    <form id="newsletterForm" class="grid-container">
        <div class="field">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" placeholder="Nhập họ tên">
        </div>

        <div class="field">
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="example@domain.com">
        </div>

        <div class="field">
            <label>Subscription Type:</label>
            <div class="radio-group">
                <input type="radio" name="subType" value="Monthly" checked> Monthly
                <input type="radio" name="subType" value="Yearly"> Yearly
            </div>
        </div>

        <div class="field">
            <label>Interests:</label>
            <div class="checkbox-group">
                <input type="checkbox" class="interest" value="Fintech"> Fintech
                <input type="checkbox" class="interest" value="Web Design"> Web Design
                <input type="checkbox" class="interest" value="Marketing"> Marketing
            </div>
        </div>

        <button type="button" onclick="validateNewsletter()">Subscribe</button>
    </form>

    <p id="msg" style="font-weight: bold; margin-top: 15px;"></p>

    <script src="ex8.js"></script>
</body>
</html>
